  <!-- Title -->
  <text x="450" y="222"
        font-family="Georgia,'Times New Roman',serif"
        font-size="46" font-weight="bold"
        fill="#ffd700" text-anchor="middle"
        filter="url(#tg)" letter-spacing="3">&#10022; Tangled Lantern &#10022;</text>

  <!-- Subtitle -->
  <text x="450" y="257"
        font-family="'Courier New',Courier,monospace"
        font-size="14" fill="#c084fc"
        text-anchor="middle" opacity="0.92"
        filter="url(#sg2)" letter-spacing="1.5">Minecraft Java Edition  &#8226;  Fabric 1.21.1  &#8226;  Open Source</text>

  <!-- Border -->
  <rect x="1" y="1" width="898" height="278"
        fill="none" stroke="url(#brd)" stroke-width="1.8" rx="14" opacity="0.55"/>
