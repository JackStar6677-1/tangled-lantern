    <circle cx="155" cy="50" r="1.3" opacity="0.70" filter="url(#sg)"/>
    <circle cx="295" cy="38" r="1.4" opacity="0.80" filter="url(#sg)"/>
    <circle cx="422" cy="52" r="1.3" opacity="0.70" filter="url(#sg)"/>
