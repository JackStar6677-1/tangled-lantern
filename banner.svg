<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="45%" cy="40%" r="75%">
      <stop offset="0%"   stop-color="#1e0045"/>
      <stop offset="50%"  stop-color="#0d001e"/>
      <stop offset="100%" stop-color="#060010"/>
    </radialGradient>
    <radialGradient id="nb1" cx="0%" cy="0%" r="100%">
      <stop offset="0%"   stop-color="#6d28d9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nb2" cx="0%" cy="0%" r="100%">
      <stop offset="0%"   stop-color="#4c1d95" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nb3" cx="0%" cy="0%" r="100%">
      <stop offset="0%"   stop-color="#7e22ce" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7e22ce" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lb" cx="35%" cy="35%" r="75%">
      <stop offset="0%"   stop-color="#fffde7"/>
      <stop offset="45%"  stop-color="#ffca28"/>
      <stop offset="100%" stop-color="#e65100" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffd700" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#fb923c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffd700" stop-opacity="0.70"/>
      <stop offset="30%"  stop-color="#f59e0b" stop-opacity="0.32"/>
      <stop offset="65%"  stop-color="#9333ea" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffd700" stop-opacity="0.70"/>
      <stop offset="50%"  stop-color="#9333ea" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0.70"/>
    </linearGradient>
    <filter id="fg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hs" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="20" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tg" x="-15%" y="-60%" width="130%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg2" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)" rx="14"/>

  <!-- Galaxy arms -->
  <path d="M -20,240 Q 180,40 450,150 T 920,30"
        fill="none" stroke="#6d28d9" stroke-width="55" opacity="0.07" stroke-linecap="round"/>
  <path d="M -20,200 Q 250,60 500,130 T 920,60"
        fill="none" stroke="#9333ea" stroke-width="32" opacity="0.055" stroke-linecap="round"/>

  <!-- Nebulae -->
