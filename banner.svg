    <circle cx="882" cy="12"  r="1.1" opacity="0.70"/>
    <circle cx="12"  cy="58"  r="0.8" opacity="0.40"/>
    <circle cx="55"  cy="72"  r="1.0" opacity="0.55"/>
    <circle cx="92"  cy="85"  r="0.7" opacity="0.45"/>
    <circle cx="128" cy="62"  r="1.1" opacity="0.65"/>
    <circle cx="165" cy="78"  r="0.8" opacity="0.40"/>
