        <rect x="-12" y="10" width="24" height="6" rx="2" fill="#c8960a"/>
      </g>
    </g>
  </g>

  <!-- LEFT lantern -->
  <g transform="translate(245,128)" opacity="0.68">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0;0,-8;0,0" dur="4.6s" begin="1s" repeatCount="indefinite"
        keyTimes="0;0.5;1" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      <g transform="scale(1.15)">
        <ellipse rx="52" ry="52" fill="url(#aura)" opacity="0.75"/>
        <line x1="0" y1="-46" x2="0" y2="-34" stroke="#c8960a" stroke-width="1.5"/>
        <rect x="-12" y="-34" width="24" height="6" rx="2" fill="#c8960a"/>
        <rect x="-9" y="-28" width="18" height="38" rx="3" fill="url(#lb)" opacity="0.90"/>
