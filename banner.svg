    <circle cx="645" cy="55"  r="1.0" opacity="0.55"/>
    <circle cx="682" cy="88"  r="0.7" opacity="0.45"/>
    <circle cx="718" cy="72"  r="1.1" opacity="0.65"/>
    <circle cx="755" cy="60"  r="0.8" opacity="0.40"/>
    <circle cx="792" cy="85"  r="1.0" opacity="0.55"/>
    <circle cx="828" cy="70"  r="0.7" opacity="0.45"/>
    <circle cx="865" cy="58"  r="1.1" opacity="0.65"/>
    <circle cx="895" cy="82"  r="0.8" opacity="0.40"/>
    <circle cx="22"  cy="175" r="0.7" opacity="0.30"/>
    <circle cx="65"  cy="188" r="0.9" opacity="0.38"/>
    <circle cx="108" cy="168" r="0.7" opacity="0.30"/>
