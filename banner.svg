  <!-- CENTER HERO lantern -->
  <g transform="translate(450,108)" opacity="1.0">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0;0,-10;0,0" dur="4.0s" begin="0s" repeatCount="indefinite"
        keyTimes="0;0.5;1" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      <g transform="scale(1.9)">
        <ellipse rx="65" ry="65" fill="url(#haura)" filter="url(#hs)" opacity="0.90"/>
        <ellipse rx="32" ry="32" fill="url(#aura)" opacity="0.80"/>
        <line x1="0" y1="-46" x2="0" y2="-34" stroke="#d4a017" stroke-width="2"/>
        <rect x="-13" y="-34" width="26" height="7" rx="3" fill="#c8960a"/>
        <rect x="-10" y="-27" width="20" height="40" rx="4" fill="url(#lb)" opacity="0.95"/>
        <line x1="-9" y1="-14" x2="9" y2="-14" stroke="#9a6800" stroke-width="0.7" opacity="0.50"/>
