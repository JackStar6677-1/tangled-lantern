        <line x1="-8" y1="-14" x2="8" y2="-14" stroke="#9a6800" stroke-width="0.6" opacity="0.45"/>
        <line x1="-8" y1="-4"  x2="8" y2="-4"  stroke="#9a6800" stroke-width="0.6" opacity="0.45"/>
